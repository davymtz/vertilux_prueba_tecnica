services:

  backend:
    build:
      context: .
      dockerfile: docker_configs/php/Dockerfile
    container_name: laravel-app
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      - postgres
    networks:
      - app-network

  frontend:
    image: node:22-alpine
    container_name: next-app
    working_dir: /app
    volumes:
      - ./frontend:/app
    tty: true
    stdin_open: true
    command: sh -c "corepack enable && corepack prepare pnpm@latest --activate && npm run dev -- --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www
      - ./docker_configs/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - app-network

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: challenge
      POSTGRES_USER: challenge
      POSTGRES_PASSWORD: challenge
      POSTGRES_ROOT_PASSWORD: challenge_admin
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  backend:
  frontend:
  postgres-data:

networks:
  app-network:
    driver: bridge